<div style="text-align:center; margin-top: 50px; font-family: sans-serif;">
  <h1>{{ title() }}</h1>

  <p>Prueba de conexión con el backend de Node.js v24</p>

  <button (click)="getHora()"
    style="padding: 12px 24px; font-size: 1rem; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px;">
    ¿Qué hora tiene el servidor?
  </button>

  @if (serverTime()) {
  <div style="margin-top: 30px; font-size: 1.5rem;">
    La hora es: <strong style="color: #2ecc71;">{{ serverTime() }}</strong>
  </div>
  }

  <router-outlet></router-outlet>
</div>
