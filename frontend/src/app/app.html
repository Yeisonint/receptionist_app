<main class="app-container">
  <!-- Glowing background blobs -->
  <div class="blob top-left"></div>
  <div class="blob bottom-right"></div>
  
  <div class="glass-container">
    <header>
      <h1>AI Receptionist</h1>
      <p class="subtitle">Ordena hablando de forma natural</p>
    </header>

    <div class="status-indicator">
      <div 
        class="orb" 
        [ngClass]="liveService.status()"
      ></div>
      <p class="status-text">{{ liveService.status() | titlecase }}</p>
    </div>

    <div class="actions">
      <button 
        class="primary-btn glass-btn" 
        (click)="toggleChat()"
        [class.active]="liveService.status() !== 'disconnected'"
      >
        <span class="icon">
          @if(liveService.status() === 'disconnected') {
            🎤
          } @else {
            ⏹️
          }
        </span>
        {{ liveService.status() === 'disconnected' ? 'Nueva orden' : 'Finalizar orden' }}
      </button>
    </div>

    @if(liveService.error()) {
      <div class="error-msg">
        {{ liveService.error() }}
      </div>
    }
  </div>
</main>

<router-outlet></router-outlet>
